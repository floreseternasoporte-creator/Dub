[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.resources]
# CPU mode (dev/demo)
# Para producción con XTTS2, descomenta y usa una instancia con GPU:
# memory = "8192"   # 8GB RAM mínimo para XTTS2
# cpu = "4"

[[services]]
name = "video-dubber-api"

[services.variables]
PORT = "8000"
PYTHONUNBUFFERED = "1"
# DEEPL_API_KEY = ""          # Para traducción con DeepL
# OPENAI_API_KEY = ""         # Para traducción con GPT-4
# MAX_FILE_SIZE_MB = "500"
# XTTS2_MODEL_PATH = "/models/xtts2"
